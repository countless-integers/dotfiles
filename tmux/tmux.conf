########################################################################################
# Settings: General
########################################################################################
# set in tmux-sensible
# set -g default-terminal "xterm-256color"
# try neovim checkhealth suggestion 🤷
# set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"

# Enable true color support (RGB is the modern capability, targets all terminals)
set -ag terminal-features ",*:RGB"
set -ag terminal-features ",*:usstyle"

# move status bar to the top, because it's a bit too much at the bottom when vim is open
set -g status-position top

# e.g. resizing panes with mouse
set -g mouse on

# Allow xterm titles in terminal window, terminal scrolling with scrollbar,
# and setting overrides of C-Up, C-Down, C-Left, C-Right
# set -g terminal-overrides "xterm*:XT:smcup@:rmcup@:kUP5=\eOA:kDN5=\eOB:kLFT5=\eOD:kRIT5=\eOC"

# set in tmux-sensible
# Scroll History
# set -g history-limit 30000

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
# set in tmux-sensible
# set -s escape-time 50

# Start windows and panes at 1, not 0, because it's easier to reach
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# yazi image preview
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g default-shell "$SHELL"

# Enable extended key sequences (e.g. Ctrl+Shift+key, Alt+key combos) so that
# terminals and apps like Neovim receive disambiguated modifier+key events
set -g extended-keys always
set -ga terminal-features "*:extkeys"

########################################################################################
# Keybindings
########################################################################################
unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix
set -g prefix C-s
bind C-s send-prefix

# jump to last window
bind-key ^ last-window

# visual+yank in copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# shift-page{up,down} for scroll except for when in vim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n Pageup if-shell "$is_vim" "send-keys Pageup" "copy-mode -u"
bind -n S-Pageup if-shell "$is_vim" "send-keys Pageup" "copy-mode -u"
bind -n S-Pagedown send-keys Pagedown

# Unbind any existing binding for Alt+B if set
unbind -n M-b
# Set tmux to send Alt+B to the shell
bind -n M-b send-keys M-b

# open a floating terminal in the path of the current pane
bind-key C-e display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux new-session -A -s scratch"

set-option -g status-interval 1

########################################################################################
# TMUX Plugin Manager
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
########################################################################################

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin theme configuration
# flavors: latte, frappe, macchiato, mocha
source-file ~/dotfiles/tmux/theme.conf
source-file ~/dotfiles/tmux/catppuccin-options.conf
run ~/.tmux/plugins/tmux/catppuccin.tmux

# window style
set -wg automatic-rename on
set -g automatic-rename-format ''
set -g window-status-separator '|'
set -g status-justify 'absolute-centre'
# one blank line for "padding"
set -g pane-border-status top
set -g pane-border-format " "


# Resurrect and Continuum
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

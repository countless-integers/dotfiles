# hyprlock — https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
# Catppuccin Mocha — https://github.com/catppuccin/catppuccin
$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
}

background {
    monitor =
    color = rgba(1e1e2eff) # base
    blur_passes = 2
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_spacing = 0.3
    rounding = 8
    inner_color = rgba(313244ff)                      # surface0
    outer_color = rgba(cba6f7ff) rgba(89b4faff) 45deg # mauve -> blue
    check_color = rgba(a6e3a1ff)                      # green
    fail_color  = rgba(f38ba8ff)                      # red
    font_color  = rgba(cdd6f4ff)                      # text
    font_family = $font
    placeholder_text = Enter password...
    fade_on_empty = false
    position = 0, -20
    halign = center
    valign = center
}

# clock
label {
    monitor =
    text = $TIME
    color = rgba(cdd6f4ff) # text
    font_size = 90
    font_family = $font
    position = 0, 160
    halign = center
    valign = center
}

# date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(a6adc8ff) # subtext0
    font_size = 22
    font_family = $font
    position = 0, 60
    halign = center
    valign = center
}
